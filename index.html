<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Cá Nhân VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Toàn bộ giao diện theo phong cách Dark Mode huyền bí */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f12; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        
        .vip-card { max-width: 650px; width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 35px 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; }
        
        /* Hiệu ứng hào quang bao quanh Ảnh đại diện */
        .avatar-container { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #00fff0; box-shadow: 0 0 20px rgba(0, 255, 240, 0.5); }
        .vip-badge { position: absolute; bottom: 5px; right: 5px; background: #ff007f; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; box-shadow: 0 0 10px rgba(255, 0, 127, 0.6); }

        h1 { font-size: 26px; font-weight: 700; background: linear-gradient(45deg, #00fff0, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .bio { font-size: 14px; color: #a0a0ab; font-weight: 300; margin-bottom: 25px; }
        
        /* Các nút mạng xã hội */
        .social-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .social-icons a { width: 45px; height: 45px; background: rgba(255,255,255,0.05); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .social-icons a:hover { background: #00fff0; color: #000; box-shadow: 0 0 15px rgba(0, 255, 240, 0.6); transform: translateY(-3px); }

        /* Khối danh mục lưu trữ */
        .section-title { font-size: 16px; font-weight: 600; text-align: left; margin: 25px 0 15px; padding-left: 5px; border-left: 3px solid #ff007f; color: #f1f1f1; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Thiết kế lưới Album Ảnh nghệ thuật */
        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .image-item { position: relative; border-radius: 14px; overflow: hidden; aspect-ratio: 4/3; background: #222; border: 1px solid rgba(255,255,255,0.05); }
        .image-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .image-item:hover img { transform: scale(1.1); }

        /* Trình phát nhạc VIP mượt mà */
        .audio-player { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .audio-icon { font-size: 24px; color: #00fff0; animation: pulse 1.5s infinite alternate; }
        .audio-info { text-align: left; flex-grow: 1; }
        .audio-info p { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        audio { width: 100%; height: 30px; margin-top: 5px; filter: invert(90%) hue-rotate(180deg); } /* Đổi màu trình phát nhạc hợp tông tối */

        /* Khung chứa Video */
        .video-container { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="avatar-container">
        <img class="avatar" src="https://picsum.photos/150/150" alt="Avatar">
        <span class="vip-badge"><i class="fa-solid fa-check"></i> VIP</span>
    </div>
    
    <h1>TÊN CỦA BẠN CHỮ IN HOA</h1>
    <p class="bio">Digital Creator | Chào mừng bạn đến với không gian âm nhạc & nghệ thuật của tôi</p>
    
    <div class="social-icons">
        <a href="#" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <div class="section-title">📷 Album hình ảnh</div>
    <div class="image-grid">
        <div class="image-item"><img src="https://picsum.photos/400/300?random=11" alt="Ảnh 1"></div>
        <div class="image-item"><img src="https://picsum.photos/400/300?random=12" alt="Ảnh 2"></div>
        <div class="image-item"><img src="https://picsum.photos/400/300?random=13" alt="Ảnh 3"></div>
        <div class="image-item"><img src="https://picsum.photos/400/300?random=14" alt="Ảnh 4"></div>
    </div>

    <div class="section-title">🎵 Bài hát yêu thích</div>
    <div class="audio-player">
        <div class="audio-icon"><i class="fa-solid fa-compact-disc fa-spin"></i></div>
        <div class="audio-info">
            <p>Tên Bài Hát Ở Đây - Ca Sĩ</p>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ phát âm thanh.
            </audio>
        </div>
    </div>

    <div class="section-title">🎥 Video nổi bật</div>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
</div>

</body>
</html>
