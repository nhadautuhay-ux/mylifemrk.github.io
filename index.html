<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Cá Nhân VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Toàn bộ giao diện theo phong cách Dark Mode huyền bí */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f12; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        
        .vip-card { max-width: 650px; width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 35px 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; }
        
        /* Hiệu ứng hào quang bao quanh Ảnh đại diện */
        .avatar-container { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #00fff0; box-shadow: 0 0 20px rgba(0, 255, 240, 0.5); }
        .vip-badge { position: absolute; bottom: 5px; right: 5px; background: #ff007f; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; box-shadow: 0 0 10px rgba(255, 0, 127, 0.6); }

        h1 { font-size: 26px; font-weight: 700; background: linear-gradient(45deg, #00fff0, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .bio { font-size: 14px; color: #a0a0ab; font-weight: 300; margin-bottom: 25px; }
        
        /* Các nút mạng xã hội */
        .social-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .social-icons a { width: 45px; height: 45px; background: rgba(255,255,255,0.05); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .social-icons a:hover { background: #00fff0; color: #000; box-shadow: 0 0 15px rgba(0, 255, 240, 0.6); transform: translateY(-3px); }

        /* Khối danh mục lưu trữ */
        .section-title { font-size: 16px; font-weight: 600; text-align: left; margin: 25px 0 15px; padding-left: 5px; border-left: 3px solid #ff007f; color: #f1f1f1; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Thiết kế lưới Album Ảnh nghệ thuật */
        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .image-item { position: relative; border-radius: 14px; overflow: hidden; aspect-ratio: 4/3; background: #222; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .image-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .image-item:hover img { transform: scale(1.1); }

        /* Giao diện khung phóng to ảnh (Lightbox) ẩn mặc định */
        .lightbox { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 12, 0.95); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(8px); }
        
        /* Khung gom nhóm Ảnh và Ghi chú để xếp chồng dọc */
        .lightbox-content { display: flex; flex-direction: column; align-items: center; max-width: 90%; max-height: 85%; animation: zoomIn 0.3s ease; }
        .lightbox-img { max-width: 100%; max-height: 75vh; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        
        /* CSS cho phần Ghi chú dưới ảnh phóng to */
        .lightbox-caption { margin-top: 15px; font-size: 16px; color: #00fff0; font-weight: 400; text-shadow: 0 2px 4px rgba(0,0,0,0.5); text-align: center; background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        
        /* Nút điều hướng phóng to */
        .lightbox-btn { position: absolute; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 24px; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; z-index: 10000; }
        .lightbox-btn:hover { background: #00fff0; color: #000; box-shadow: 0 0 15px rgba(0, 255, 240, 0.6); }
        .close-btn { top: 20px; right: 20px; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* Trình phát nhạc VIP mượt mà */
        .audio-player { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .audio-icon { font-size: 24px; color: #00fff0; animation: pulse 1.5s infinite alternate; }
        .audio-info { text-align: left; flex-grow: 1; }
        .audio-info p { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        audio { width: 100%; height: 30px; margin-top: 5px; filter: invert(90%) hue-rotate(180deg); }

        /* Khung chứa Video */
        .video-container { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="avatar-container">
        <img class="avatar" src="z7924576793433_21c45b9408bbf73677e9a4500c288e91.jpg" alt="Avatar">
    </div>
    
    <h1>NGUYỄN TRUNG KIÊN</h1>
    <p class="bio">Digital Creator | Không gian âm nhạc & nghệ thuật của tôi</p>
    
    <div class="social-icons">
        <a href="#" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <div class="section-title">📷 Album hình ảnh</div>
    <div class="image-grid">
        <div class="image-item" onclick="openLightbox(0)"><img src="z7924576793433_21c45b9408bbf73677e9a4500c288e91.jpg" alt="Làm việc tại IOC năm 2023 -2025🌲"></div>
        <div class="image-item" onclick="openLightbox(1)"><img src="https://picsum.photos/800/600?random=12" alt="Sân khấu biểu diễn ca nhạc cực cháy mâm 🎸"></div>
        <div class="image-item" onclick="openLightbox(2)"><img src="https://picsum.photos/800/600?random=13" alt="Khoảnh khắc hoàng hôn lãng mạn bên bờ biển 🌅"></div>
        <div class="image-item" onclick="openLightbox(3)"><img src="https://picsum.photos/800/600?random=14" alt="Góc làm việc setup máy tính cá nhân buổi tối 💻"></div>
    </div>

    <div class="section-title">🎵 Bài hát yêu thích</div>
    <div class="audio-player">
        <div class="audio-icon"><i class="fa-solid fa-compact-disc fa-spin"></i></div>
        <div class="audio-info">
            <p>Tên Bài Hát Ở Đây - Ca Sĩ</p>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <div class="section-title">🎥 Video nổi bật</div>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
</div>

<div id="lightboxOverlay" class="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-btn close-btn" onclick="forceCloseLightbox()"><i class="fa-solid fa-xmark"></i></button>
    <button class="lightbox-btn prev-btn" onclick="changeImage(-1, event)"><i class="fa-solid fa-chevron-left"></i></button>
    
    <div class="lightbox-content">
        <img id="lightboxImage" class="lightbox-img" src="" alt="Phóng to">
        <div id="lightboxCaption" class="lightbox-caption">Dòng ghi chú ảnh</div>
    </div>
    
    <button class="lightbox-btn next-btn" onclick="changeImage(1, event)"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<script>
    let currentImgIndex = 0;
    
    // Thu thập danh sách các link ảnh và danh sách các đoạn ghi chú tương ứng
    const imgElements = Array.from(document.querySelectorAll('.image-grid .image-item img'));
    const images = imgElements.map(img => img.src);
    const captions = imgElements.map(img => img.alt || "Hình ảnh không có ghi chú");

    function openLightbox(index) {
        currentImgIndex = index;
        updateLightboxContent();
        document.getElementById('lightboxOverlay').style.display = 'flex';
    }

    function forceCloseLightbox() {
        document.getElementById('lightboxOverlay').style.display = 'none';
    }

    function closeLightbox(event) {
        if (event.target.id === 'lightboxOverlay') {
            forceCloseLightbox();
        }
    }

    function changeImage(direction, event) {
        event.stopPropagation(); 
        currentImgIndex += direction;
        
        if (currentImgIndex >= images.length) currentImgIndex = 0;
        if (currentImgIndex < 0) currentImgIndex = images.length - 1;
        
        updateLightboxContent();
    }

    // Hàm cập nhật cả ảnh lẫn ghi chú tương ứng cùng lúc
    function updateLightboxContent() {
        document.getElementById('lightboxImage').src = images[currentImgIndex];
        document.getElementById('lightboxCaption').innerText = captions[currentImgIndex];
    }

    // Phím tắt bàn phím
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('lightboxOverlay').style.display === 'flex') {
            if (e.key === 'Escape') forceCloseLightbox();
            if (e.key === 'ArrowRight') changeImage(1, event);
            if (e.key === 'ArrowLeft') changeImage(-1, event);
        }
    });
</script>

</body>
</html>
