<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Lưu Trữ Hình Ảnh - Kiên VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f12; color: #ffffff; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; text-align: center; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #00fff0; text-decoration: none; font-size: 14px; margin-bottom: 20px; border: 1px solid rgba(0,255,240,0.3); padding: 8px 16px; border-radius: 20px; transition: 0.3s; }
        .back-btn:hover { background: #00fff0; color: #000; box-shadow: 0 0 15px rgba(0,255,240,0.4); }
        h1 { font-size: 28px; margin-bottom: 30px; background: linear-gradient(45deg, #00fff0, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        @media (max-width: 600px) { .image-grid { grid-template-columns: repeat(2, 1fr); } }
        .image-item { border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.05); }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
        <h1>📷 Kho Lưu Trữ Hình Ảnh</h1>
        
        <div class="image-grid">
            <div class="image-item"><img src="z7924576793433_21c45b9408bbf73677e9a4500c288e91.jpg"></div>
            <div class="image-item"><img src="https://picsum.photos/800/600?random=21"></div>
            <div class="image-item"><img src="https://picsum.photos/800/600?random=22"></div>
            <div class="image-item"><img src="https://picsum.photos/800/600?random=23"></div>
            <div class="image-item"><img src="https://picsum.photos/800/600?random=24"></div>
            <div class="image-item"><img src="https://picsum.photos/800/600?random=25"></div>
        </div>
    </div>
</body>
</html>
