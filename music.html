<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Âm Nhạc - Kiên VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f12; color: #ffffff; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 650px; width: 100%; text-align: center; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #00fff0; text-decoration: none; font-size: 14px; margin-bottom: 20px; border: 1px solid rgba(0,255,240,0.3); padding: 8px 16px; border-radius: 20px; transition: 0.3s; }
        .back-btn:hover { background: #00fff0; color: #000; box-shadow: 0 0 15px rgba(0,255,240,0.4); }
        h1 { font-size: 28px; margin-bottom: 30px; background: linear-gradient(45deg, #00fff0, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .music-list { display: flex; flex-direction: column; gap: 20px; }
        .media-box { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
        <h1>🎵 Playlist Bài Hát Yêu Thích</h1>
        
        <div class="music-list">
            <div class="media-box">
                <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/228323343&color=%2300fff0&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
            </div>
            </div>
    </div>
</body>
</html>
